<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Data Agents</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>

<x-main></x-main>

<script>
class XMain extends HTMLElement {
	#login = null;
	#sqlm = null;

	constructor() {
		super();
		this.innerHTML = `
			<x-login></x-login>
			<x-sqlm></x-sqlm>
		`;
		this.#sqlm = this.querySelector('x-sqlm');
		this.#login = this.querySelector('x-login');
		this.#login.hidden = true;
		this.#sqlm.hidden = true;
		this.addEventListener('loginsuccess', (e) => {
			this.renderPage();
		});
		this.renderPage();
	}

	async renderPage() {
		let res = await fetch('/checkauth');
		const statusCode = res.status;
		if (statusCode == 200) {
			this.#sqlm.hidden = false;
			this.#login.hidden = true;
			this.#sqlm.init();
		} else if (statusCode == 401) { // unauthorized
			this.#login.hidden = false;
			this.#sqlm.hidden = true;
		} else {
			this.#sqlm.hidden = true;
		}
	}
}

class XLogin extends HTMLElement {
	constructor() {
		super();
		this.innerHTML = `
			<h1>SQLM</h1>
			<form>
				<label for="password">Password:</label>
				<input type="password" id="password" name="password" required>
				<button type="button">Login</button>
				<br/>
				<div id="invalidpassword" style="display: none;">Invalid Password</div>
			</form>
		`;
		this.querySelector('form').onsubmit = (e) => {
			e.preventDefault();
			this.submitLogin();
		};
		this.querySelector('button').onclick = (e) => {
			e.preventDefault();
			this.submitLogin();
		};
	}

	async submitLogin() {
		const password = this.querySelector('#password').value;
		const response = await fetch('/login', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			credentials: 'include',
			body: JSON.stringify({ password }),
		});
		if (response.ok) {
			this.querySelector('#invalidpassword').style.display = "none";
			this.dispatchEvent(new CustomEvent('loginsuccess', { bubbles: true }));
		} else {
			this.querySelector('#invalidpassword').style.display = "inline";
			setTimeout(() => {this.querySelector('#invalidpassword').style.display = "none";}, 3000);
		}
	}
}

class XSqlm extends HTMLElement {
	#messageinput = null;
	#sendmessage = null;
	#messageerror = null;
	#isSendingMessage = false;
	#response = null;
	#query = null;
	#sqlcode = null;
	#execresult = null;
	#execerror = null;

	constructor() {
		super();
		this.innerHTML = `
			<h1>Query Agent</h1>
			<section id="prompt">
				<div class="label">Message:</div>
				<textarea id="messageinput" class="mainarea" placeholder="Send a message to generate a query."></textarea>
				<div class="btns">
					<button id="sendmessage" type="button">Send</button>
				</div>
			</section>
			<div id="messageerror" class="errmsg" hidden></div>
			<section id="response" hidden>
				<div class="label">Query:</div>
				<div id="query" class="mainarea">
					<pre id="sqlcode"></pre>
				</div>
				<div class="btns">
					<button id="executesql" type="button">Execute</button>
					<button id="rateup" type="button">Rate Correct</button>
					<button id="ratedown" type="button">Rate Incorrect</button>
				</div>
			</section>
			<div id="execerror" class="errmsg" hidden></div>
			<section id="execresult" hidden>
				<div class="label">Results:</div>
				<div id="sql-exec-result" class="mainarea"></div>
				<div class="btns">
					<button id="clearresult" type="button">Close</button>
				</div>
			</section>`;
		this.#messageinput = this.querySelector('#messageinput');
		this.#sendmessage = this.querySelector('#sendmessage');
		this.#messageerror = this.querySelector('#messageerror');
		this.#response = this.querySelector('#response');
		this.#query = this.querySelector('#query');
		this.#sqlcode = this.querySelector('#sqlcode');
		this.#execresult = this.querySelector('#execresult');
		this.#execerror = this.querySelector('#execerror');
	}

	async init() {
		await this.render();
	}

	async render() {
		//await this.updateMessages();
		this.bindEvents();
	}

	bindEvents() {
		this.unbindEvents();
		
		this.#sendmessage.onclick = async () => {
			await this.sendMessage();
		};
		this.#messageinput.onkeydown = async (e) => {
			if (e.key === "Enter" && !e.shiftKey) {
				e.preventDefault();
				await this.sendMessage();
			}
		};
		this.querySelector("#executesql").onclick = async () => {
			await this.executeSQLForMessage();
		};
	}

	unbindEvents() {
		this.onclick = null;
		this.querySelectorAll('button').forEach(btn => btn.onclick = null);
		this.querySelectorAll("aside li").forEach(li => li.onclick = null);
		if (this.#messageinput) this.#messageinput.onkeydown = null;
	}

	async sendMessage() {
		if (this.#isSendingMessage) return;
		const text = this.#messageinput.value.trim();
		if (!text) return;
		this.#isSendingMessage = true;
		this.#messageinput.disabled = true;
		this.#sendmessage.disabled = true;
		this.#messageerror.hidden = true;
		this.#messageerror.textContent = "";

		this.#response.hidden = false;
		this.#sqlcode.innerHTML = `<em>Waiting for response ...</em>`;

		try {
			const res = await fetch('/message', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ text }),
			});
			if (!res.ok) {
				this.#messageerror.textContent = "Failed to send message.";
				this.#messageerror.hidden = false;
				this.#sqlcode.innerHTML = `<em>No response.</em>`;
				return;
			}
			const payload = await res.json();
			this.#sqlcode.innerHTML = `${escapeHTML(payload.sql ?? "")}`;
		} catch {
			this.#messageerror.textContent = "Failed to send message.";
			this.#messageerror.hidden = false;
			this.#sqlcode.innerHTML = `<em>No response.</em>`;
		} finally {
			this.#isSendingMessage = false;
			this.#messageinput.disabled = false;
			this.#sendmessage.disabled = false;
		}
	}

	async executeSQLForMessage() {
		const button = this.querySelector("#executesql");
		button.disabled = true;
		const oldLabel = button.textContent;
		button.textContent = "Executing...";
		this.#execerror.hidden = true;
		this.#execerror.textContent = "";
		const sql = this.#sqlcode.textContent || "";
		if (!sql) {
			this.#execerror.hidden = false;
			this.#execerror.textContent = "No SQL to execute.";
			button.disabled = false;
			button.textContent = oldLabel;
			return;
		}

		try {
			const res = await fetch("/execute", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify({ sql: sql }),
			});
			if (!res.ok) {
				const txt = await res.text();
				this.#execerror.hidden = false;
				this.#execerror.textContent = `${escapeHTML(txt || "Execution failed.")}`;
				return;
			}
			const payload = await res.json();
			const rows = Array.isArray(payload.rows) ? payload.rows : [];
			this.renderExecRows(rows);
		} catch (e) {
			this.#execerror.hidden = false;
			this.#execerror.textContent = "Execution failed.";
		} finally {
			button.disabled = false;
			button.textContent = oldLabel;
		}
	}

	renderExecRows(rows) {
		const resultEl = this.querySelector("#sql-exec-result");
		if (rows.length === 0) {
			resultEl.innerHTML = `<div class="sql-empty">No rows returned.</div>`;
			return;
		}
		const cols = Object.keys(rows[0] ?? {});
		const head = cols.map((c) => `<th>${escapeHTML(c)}</th>`).join("");
		const body = rows.map((r) => {
			const tds = cols.map((c) => {
				const v = r[c];
				const s = v == null ? "NULL" : (typeof v === "object" ? JSON.stringify(v) : String(v));
				return `<td>${escapeHTML(s)}</td>`;
			}).join("");
			return `<tr>${tds}</tr>`;
		}).join("");
		resultEl.innerHTML = `
			<div class="sql-result-table-wrap">
				<table class="sql-result-table">
					<thead><tr>${head}</tr></thead>
					<tbody>${body}</tbody>
				</table>
			</div>
		`;
	}
}

function escapeHTML(str) {
	const div = document.createElement('div');
	div.textContent = str;
	return div.innerHTML;
}

customElements.define('x-main', XMain);
customElements.define('x-login', XLogin);
customElements.define('x-sqlm', XSqlm);

</script>
</body>
</html>
