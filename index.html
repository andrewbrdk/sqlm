class XMain extends HTMLElement {
	#login = null;
	#sqlm = null;

	constructor() {
		super();
		this.innerHTML = `
			<x-login></x-login>
			<x-sqlm></x-sqlm>
		`;
		this.#sqlm = this.querySelector('x-sqlm');
		this.#login = this.querySelector('x-login');
		this.#login.hidden = true;
		this.#sqlm.hidden = true;
		this.addEventListener('loginsuccess', (e) => {
			this.renderPage();
		});
		this.renderPage();
	}

	async renderPage() {
		let res = await fetch('/checkauth');
		const statusCode = res.status;
		if (statusCode == 200) {
			this.#sqlm.hidden = false;
			this.#login.hidden = true;
			this.#sqlm.init();
		} else if (statusCode == 401) { // unauthorized
			this.#login.hidden = false;
			this.#sqlm.hidden = true;
		} else {
			this.#sqlm.hidden = true;
		}
	}
}

class XLogin extends HTMLElement {
	constructor() {
		super();
		this.innerHTML = `
			<h1>SQLM</h1>
			<form>
				<label for="password">Password:</label>
				<input type="password" id="password" name="password" required>
				<button type="button">Login</button>
				<br/>
				<div id="invalidpassword" style="display: none;">Invalid Password</div>
			</form>
		`;
		this.querySelector('form').onsubmit = (e) => {
			e.preventDefault();
			this.submitLogin();
		};
		this.querySelector('button').onclick = (e) => {
			e.preventDefault();
			this.submitLogin();
		};
	}

	async submitLogin() {
		const password = this.querySelector('#password').value;
		const response = await fetch('/login', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			credentials: 'include',
			body: JSON.stringify({ password }),
		});
		if (response.ok) {
			this.querySelector('#invalidpassword').style.display = "none";
			this.dispatchEvent(new CustomEvent('loginsuccess', { bubbles: true }));
		} else {
			this.querySelector('#invalidpassword').style.display = "inline";
			setTimeout(() => {this.querySelector('#invalidpassword').style.display = "none";}, 3000);
		}
	}
}

	unbindEvents() {

	async sendMessage() {
		if (this.#isSendingMessage) return;
		const text = this.#messageinput.value.trim();
		if (!text) return;
		this.#isSendingMessage = true;
		this.#messageinput.disabled = true;
		this.#sendmessage.disabled = true;
		this.#messageerror.hidden = true;
		this.#messageerror.textContent = "";

		this.#llmresp.innerHTML = `<em>Waiting for response ...</em>`;

		try {
			const res = await fetch('/message', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ text }),
			});
			if (!res.ok) {
				this.#messageerror.textContent = "Failed to send message.";
				this.#messageerror.hidden = false;
				this.#llmresp.innerHTML = `<em>No response.</em>`;
				return;
			}
			const payload = await res.json();
			this.#llmresp.innerHTML = `
				<div class="outline">${escapeHTML(payload.outline ?? "")}</div>
				<pre class="sql-code">${escapeHTML(payload.sql ?? "")}</pre>
			`;
		} catch {
			this.#messageerror.textContent = "Failed to send message.";
			this.#messageerror.hidden = false;
			this.#llmresp.innerHTML = `<em>No response.</em>`;
		} finally {
			this.#isSendingMessage = false;
			this.#messageinput.disabled = false;
			this.#sendmessage.disabled = false;
		}
	}

	const div = document.createElement('div');
	div.textContent = str;
	return div.innerHTML;
