services:
  queryagent:
    image: queryagent
    container_name: queryagent_web
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      # host:container
      - "8080:8080"
    volumes:
      #- ./queryagent.toml:/app/queryagent.toml
      - ./context_examples:/app/context:ro
      - ./logs:/app/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      QUERYAGENT_EXEC_DB: postgres://pguser:password123@postgres:5432/queryagent?sslmode=disable
      QUERYAGENT_CONTEXT_DIR: /app/context
      QUERYAGENT_LOG_FILE: /app/logs/queryagent.log
      #QUERYAGENT_CONF: /app/queryagent.toml
      #QUERYAGENT_PORT: 8080
      #QUERYAGENT_PASSWORD: "qwerty"

  postgres:
    image: postgres:16
    container_name: queryagent_postgres
    restart: always
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: queryagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d queryagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: queryagent_pgweb
    restart: always
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://pguser:password123@postgres:5432/queryagent?sslmode=disable
    depends_on:
      - postgres

volumes:
  postgres_data:
